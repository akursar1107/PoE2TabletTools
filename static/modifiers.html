<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>PoE2 Tablet Modifiers Reference</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: #0e0e0e;
                color: #c9b99a;
                font-family: "Segoe UI", sans-serif;
                font-size: 13px;
            }
            header {
                padding: 14px 24px;
                border-bottom: 1px solid #2a2a2a;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            header h1 {
                font-size: 17px;
                color: #e8d5a3;
                letter-spacing: 1px;
            }
            #status {
                font-size: 12px;
                color: #666;
            }
            #status.ok {
                color: #5a9e5a;
            }
            #refresh-bar {
                height: 2px;
                background: #a08050;
                transition: width 0.5s linear;
                width: 100%;
            }
            .top-nav {
                background: #1a1a1a;
                border-bottom: 1px solid #2a2a2a;
                padding: 8px 24px;
                display: flex;
                gap: 24px;
            }
            .top-nav a {
                color: #888;
                text-decoration: none;
                font-size: 12px;
                padding: 4px 8px;
                border-radius: 4px;
                transition: all 0.2s;
            }
            .top-nav a:hover {
                color: #c8a96e;
                background: #2a2a2a;
            }
            .top-nav a.active {
                color: #c8a96e;
                background: #2a2a2a;
            }
            .tablet-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 14px;
                padding: 14px;
            }
            .tablet-card {
                background: #141414;
                border: 1px solid #2a2a2a;
                border-radius: 6px;
                overflow: hidden;
            }
            .tablet-card h3 {
                padding: 9px 14px;
                font-size: 13px;
                color: #c8a96e;
                background: #1a1a1a;
                border-bottom: 1px solid #2a2a2a;
                text-transform: capitalize;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .tablet-card h3:hover {
                background: #2a2a2a;
            }
            .tablet-card h3::before {
                content: "▶ ";
                font-size: 10px;
                color: #666;
            }
            .tablet-card h3.expanded::before {
                content: "▼ ";
            }
            .mod-list {
                padding: 14px;
                display: none;
            }
            .mod-list.expanded {
                display: block;
            }
            .mod-section {
                margin-bottom: 16px;
            }
            .mod-section:last-child {
                margin-bottom: 0;
            }
            .mod-section-header {
                font-size: 11px;
                color: #a08050;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 8px;
                padding-bottom: 4px;
                border-bottom: 1px solid #2a2a2a;
            }
            .mod-group {
                margin-bottom: 12px;
                padding-bottom: 12px;
                border-bottom: 1px solid #1e1e1e;
            }
            .mod-group:last-child {
                border-bottom: none;
                margin-bottom: 0;
                padding-bottom: 0;
            }
            .mod-group-title {
                font-size: 11px;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 6px;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .mod-type-badge {
                font-size: 10px;
                padding: 1px 4px;
                border-radius: 2px;
                font-weight: bold;
            }
            .prefix-badge {
                color: #996666;
                background: rgba(153, 102, 102, 0.15);
            }
            .suffix-badge {
                color: #669966;
                background: rgba(102, 153, 102, 0.15);
            }
            .mod-item {
                font-size: 12px;
                color: #aaa;
                padding: 3px 0;
                padding-left: 12px;
                border-left: 2px solid #333;
                margin: 2px 0;
            }
            .mod-item:hover {
                color: #c8a96e;
                border-left-color: #a08050;
            }
            .mod-description {
                color: #777;
                font-size: 11px;
                font-weight: normal;
            }
            .mod-item:hover .mod-description {
                color: #999;
            }
            .empty-message {
                color: #555 !important;
                font-style: italic;
            }
            .filter-bar {
                padding: 14px 24px;
                border-bottom: 1px solid #2a2a2a;
                background: #1a1a1a;
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .filter-bar input {
                background: #2a2a2a;
                border: 1px solid #3a3a3a;
                color: #c9b99a;
                padding: 6px 10px;
                border-radius: 4px;
                font-size: 12px;
                width: 200px;
            }
            .filter-bar input:focus {
                outline: none;
                border-color: #a08050;
            }
            .count-badge {
                font-size: 10px;
                color: #666;
                background: #2a2a2a;
                padding: 1px 6px;
                border-radius: 4px;
            }
            .info-text {
                padding: 14px 24px;
                color: #666;
                font-size: 12px;
            }
            .info-text a {
                color: #888;
            }
        </style>
    </head>
    <body>
        <div id="refresh-bar"></div>
        <header>
            <h1>⬡ Tablet Modifiers Reference</h1>
            <span id="status">Static Data</span>
        </header>

        <div class="top-nav">
            <a href="/">Home</a>
            <a href="/dashboard">Main Dashboard</a>
            <a href="/normal-prices">Normal Prices</a>
            <a href="/modifiers" class="active">Modifiers</a>
        </div>

        <div class="filter-bar">
            <input
                type="text"
                id="filter-input"
                placeholder="Filter modifiers..."
            />
            <button
                id="expand-all"
                style="
                    padding: 6px 12px;
                    background: #2a2a2a;
                    border: 1px solid #3a3a3a;
                    color: #c9b99a;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 12px;
                "
            >
                Expand All
            </button>
            <button
                id="collapse-all"
                style="
                    padding: 6px 12px;
                    background: #2a2a2a;
                    border: 1px solid #3a3a3a;
                    color: #c9b99a;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 12px;
                "
            >
                Collapse All
            </button>
        </div>
        <div class="filter-bar" style="border-top: none; padding-top: 0">
            <input
                type="text"
                id="global-filter-input"
                placeholder="Global search (all tablets)..."
                style="width: 300px"
            />
            <span
                id="global-filter-results"
                style="color: #666; font-size: 12px; margin-left: 12px"
            ></span>
        </div>

        <div class="info-text">
            Data source:
            <a
                href="https://www.poe2wiki.net/wiki/List_of_modifiers_for_tablets"
                target="_blank"
                >PoE2 Wiki</a
            >
            | Showing all modifiers with descriptions. Total modifiers:
            <span id="total-mods">0</span>
        </div>

        <div class="tablet-grid" id="tablet-grid">
            <!-- Populated by JavaScript -->
        </div>

        <script>
            const API = window.location.origin || "http://localhost:8001";
            let allData = [];

            async function loadData() {
                try {
                    const res = await fetch(
                        `${API}/api/reports/mod-reference-separated`,
                    );
                    if (res.ok) {
                        allData = await res.json();
                        renderTablets();
                    }
                } catch (e) {
                    console.error("Failed to load data:", e);
                }
            }

            function renderTablets() {
                const grid = document.getElementById("tablet-grid");
                const allMods = allData.reduce(
                    (sum, tablet) => sum + (tablet.mod_count || 0),
                    0,
                );
                document.getElementById("total-mods").textContent = allMods;

                grid.innerHTML = allData
                    .map((tablet) => {
                        const totalMods = tablet.mod_count || 0;
                        const prefixCount = tablet.prefix_count || 0;
                        const suffixCount = tablet.suffix_count || 0;

                        const prefixes = tablet.prefixes || {};
                        const suffixes = tablet.suffixes || {};

                        const renderModGroup = (group, mods, type) => {
                            const badge =
                                type === "prefix"
                                    ? '<span class="mod-type-badge prefix-badge">Prefix</span>'
                                    : '<span class="mod-type-badge suffix-badge">Suffix</span>';
                            return `
                                <div class="mod-group">
                                    <div class="mod-group-title">
                                        ${badge}
                                        ${group}
                                    </div>
                                    ${mods
                                        .map(
                                            (m) => `
                                    <div class="mod-item">
                                        <strong>${m.name}</strong>
                                        <span class="mod-description"> - ${m.description}</span>
                                    </div>
                                `,
                                        )
                                        .join("")}
                                </div>
                            `;
                        };

                        const htmlPrefixes = Object.entries(prefixes)
                            .map(([group, mods]) =>
                                renderModGroup(group, mods, "prefix"),
                            )
                            .join("");

                        const htmlSuffixes = Object.entries(suffixes)
                            .map(([group, mods]) =>
                                renderModGroup(group, mods, "suffix"),
                            )
                            .join("");

                        return `
                        <div class="tablet-card">
                            <h3 data-tablet="${tablet.tablet_type}" class="">
                                <a href="/tablet/${tablet.tablet_type}" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px; flex: 1;">
                                    ${tablet.tablet_type}
                                </a>
                                <span class="count-badge">${prefixCount} prefixes, ${suffixCount} suffixes</span>
                            </h3>
                            <div class="mod-list">
                                <div class="mod-section">
                                    <div class="mod-section-header">Prefixes (${prefixCount})</div>
                                    ${htmlPrefixes || '<div class="mod-item empty-message">No prefixes</div>'}
                                </div>
                                <div class="mod-section">
                                    <div class="mod-section-header">Suffixes (${suffixCount})</div>
                                    ${htmlSuffixes || '<div class="mod-item empty-message">No suffixes</div>'}
                                </div>
                            </div>
                        </div>
                    `;
                    })
                    .join("");

                // Add click handlers to the card itself, not the h3 (since h3 has a link)
                grid.querySelectorAll(".tablet-card").forEach((card) => {
                    const h3 = card.querySelector("h3");
                    const modList = card.querySelector(".mod-list");

                    // Click on card (not on the link) toggles expand
                    card.addEventListener("click", (e) => {
                        if (
                            e.target.tagName !== "A" &&
                            !e.target.closest("a")
                        ) {
                            h3.classList.toggle("expanded");
                            modList.classList.toggle("expanded");
                        }
                    });
                });

                // Add filter functionality
                const filterInput = document.getElementById("filter-input");
                filterInput.addEventListener("input", (e) => {
                    const query = e.target.value.toLowerCase();
                    grid.querySelectorAll(".mod-item").forEach((item) => {
                        const visible = item.textContent
                            .toLowerCase()
                            .includes(query);
                        item.style.display = visible ? "block" : "none";
                    });
                    // Hide mod-groups that have no visible items
                    grid.querySelectorAll(".mod-group").forEach((group) => {
                        const items = group.querySelectorAll(".mod-item");
                        const hasVisible = Array.from(items).some(
                            (item) => item.style.display !== "none",
                        );
                        group.style.display = hasVisible ? "block" : "none";
                    });
                });

                // Add expand-all/collapse-all functionality
                document
                    .getElementById("expand-all")
                    .addEventListener("click", () => {
                        grid.querySelectorAll(".tablet-card h3").forEach(
                            (h3) => {
                                h3.classList.add("expanded");
                                const modList = h3.nextElementSibling;
                                if (modList) modList.classList.add("expanded");
                            },
                        );
                    });

                document
                    .getElementById("collapse-all")
                    .addEventListener("click", () => {
                        grid.querySelectorAll(".tablet-card h3").forEach(
                            (h3) => {
                                h3.classList.remove("expanded");
                                const modList = h3.nextElementSibling;
                                if (modList)
                                    modList.classList.remove("expanded");
                            },
                        );
                    });
            }

            // Global search functionality
            let globalSearchTimeout;
            const globalFilterInput = document.getElementById(
                "global-filter-input",
            );
            const globalFilterResults = document.getElementById(
                "global-filter-results",
            );

            globalFilterInput.addEventListener("input", (e) => {
                clearTimeout(globalSearchTimeout);
                const query = e.target.value.toLowerCase();

                if (query.length < 2) {
                    globalFilterResults.textContent = "";
                    // Reset all tablets to visible
                    grid.querySelectorAll(".tablet-card").forEach((card) => {
                        card.style.display = "block";
                    });
                    return;
                }

                globalSearchTimeout = setTimeout(() => {
                    let matchCount = 0;
                    grid.querySelectorAll(".tablet-card").forEach((card) => {
                        const h3 = card.querySelector("h3");
                        const tabletType = h3.textContent.toLowerCase();
                        const modList = card.querySelector(".mod-list");

                        if (modList) {
                            const items = modList.querySelectorAll(".mod-item");
                            let hasMatch = false;
                            items.forEach((item) => {
                                const text = item.textContent.toLowerCase();
                                if (text.includes(query)) {
                                    hasMatch = true;
                                    matchCount++;
                                }
                            });
                            card.style.display = hasMatch ? "block" : "none";
                        }
                    });

                    if (matchCount > 0) {
                        globalFilterResults.textContent = `Found ${matchCount} matches`;
                    } else {
                        globalFilterResults.textContent = "No matches found";
                    }
                }, 300);
            });

            loadData();
        </script>
    </body>
</html>
