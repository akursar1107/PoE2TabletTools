<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoE2 Tablet Modifiers Reference</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #2d2d44; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3d3d54; }
        .modifier-item { transition: all 0.2s ease; }
        .modifier-item:hover { background-color: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <header class="mb-8">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h1 class="text-3xl font-bold text-white">PoE2 Tablet Modifiers Reference</h1>
                    <p class="text-gray-400 mt-1">Global prefixes + Shared & Unique suffixes per tablet type</p>
                </div>
                <button onclick="fetchModifiers()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 border border-gray-600 rounded-lg text-sm text-white transition-colors flex items-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    <span>Refresh</span>
                </button>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 text-center">
                    <div class="text-2xl mb-2">🏺</div>
                    <p class="text-sm text-gray-400 mb-1">League</p>
                    <p class="text-xl font-bold text-amber-400" id="current-league">Loading...</p>
                </div>
                <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 text-center">
                    <div class="text-2xl mb-2">📋</div>
                    <p class="text-sm text-gray-400 mb-1">Tablet Types</p>
                    <p class="text-xl font-bold text-amber-400" id="tablet-count">0</p>
                </div>
                <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 text-center">
                    <div class="text-2xl mb-2">✨</div>
                    <p class="text-sm text-gray-400 mb-1">Prefixes</p>
                    <p class="text-xl font-bold text-amber-400" id="prefix-count">0</p>
                </div>
                <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 text-center">
                    <div class="text-2xl mb-2">🔗</div>
                    <p class="text-sm text-gray-400 mb-1">Shared Suffixes</p>
                    <p class="text-xl font-bold text-emerald-400" id="shared-suffix-count">0</p>
                </div>
            </div>
        </header>

        <main class="space-y-6">
            <section class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden">
                <button onclick="toggleSection('prefixes')" class="w-full p-4 text-left flex items-center justify-between hover:bg-gray-700/50 transition-colors">
                    <div class="flex items-center space-x-3">
                        <span class="text-2xl">✨</span>
                        <h2 class="text-xl font-semibold text-white">Global Prefixes</h2>
                        <span class="text-sm text-gray-400 bg-gray-700 px-2 py-1 rounded-full" id="prefix-badge">0</span>
                    </div>
                    <svg id="prefixes-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div id="prefixes-content" class="p-4 pt-0"><ul class="space-y-2" id="prefix-list"><li class="text-gray-500 text-center py-4">Loading...</li></ul></div>
            </section>

            <section class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden">
                <button onclick="toggleSection('shared-suffixes')" class="w-full p-4 text-left flex items-center justify-between hover:bg-gray-700/50 transition-colors">
                    <div class="flex items-center space-x-3">
                        <span class="text-2xl">🔗</span>
                        <h2 class="text-xl font-semibold text-white">Shared Suffixes</h2>
                        <span class="text-sm text-gray-400 bg-emerald-900/20 text-emerald-400 px-2 py-1 rounded-full" id="shared-badge">0</span>
                    </div>
                    <svg id="shared-suffixes-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div id="shared-suffixes-content" class="p-4 pt-0"><ul class="space-y-2" id="shared-suffix-list"><li class="text-gray-500 text-center py-4">Loading...</li></ul></div>
            </section>

            <div class="space-y-4" id="unique-sections"></div>
        </main>

        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="fixed bottom-6 right-6 p-3 bg-gray-700 hover:bg-gray-600 border border-gray-600 rounded-full text-white transition-colors shadow-lg z-50" title="Back to top">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
        </button>
    </div>

    <script>
        const tabletInfo = {
            ritual: { icon: "🏺", name: "Ritual", color: "amber" },
            breach: { icon: "⚡", name: "Breach", color: "purple" },
            delirium: { icon: "🌀", name: "Delirium", color: "green" },
            expedition: { icon: "⛺", name: "Expedition", color: "blue" },
            temple: { icon: "🏛️", name: "Temple", color: "orange" },
            abyss: { icon: "🕳️", name: "Abyss", color: "red" },
            irradiated: { icon: "☢️", name: "Irradiated", color: "emerald" },
            overseer: { icon: "👁️", name: "Overseer", color: "cyan" }
        };

        const expandedSections = new Set(['prefixes', 'shared-suffixes']);

        function toggleSection(sectionId) {
            const content = document.getElementById(sectionId + '-content');
            const icon = document.getElementById(sectionId + '-icon');
            if (expandedSections.has(sectionId)) {
                expandedSections.delete(sectionId);
                content.style.display = 'none';
                icon.style.transform = 'rotate(0deg)';
            } else {
                expandedSections.add(sectionId);
                content.style.display = 'block';
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function toggleTabletSection(tabletType) {
            const sectionId = `tablet-${tabletType}`;
            const content = document.getElementById(sectionId + '-content');
            const icon = document.querySelector(`#${sectionId} .tablet-icon`);
            if (content.style.display === 'none' || !content.style.display) {
                content.style.display = 'block';
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.style.display = 'none';
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function formatModName(name) {
            if (!name) return "";
            return name.replace(/of /g, "").replace(/^The /g, "").replace(/^A /g, "").replace(/^An /g, "").replace(/'s$/g, "").trim();
        }

        function formatDescription(desc) {
            if (!desc) return "";
            return desc.replace(/Map /g, "").replace(/ in Map/g, "").replace(/has /g, "").replace(/#%/g, "").replace(/\[.*?\]/g, "").replace(/  /g, " ").trim();
        }

        function extractAllModifiers(data, type) {
            const allMods = [];
            const seen = new Set();
            for (const tablet of data) {
                const mods = tablet[type];
                for (const category of Object.values(mods)) {
                    for (const mod of category.mods) {
                        if (!seen.has(mod.name)) {
                            seen.add(mod.name);
                            allMods.push(mod);
                        }
                    }
                }
            }
            return allMods.sort((a, b) => a.name.localeCompare(b.name));
        }

        function extractSuffixesByTablet(data) {
            const result = {};
            for (const tablet of data) {
                const suffixes = [];
                for (const category of Object.values(tablet.suffixes)) {
                    suffixes.push(...category.mods);
                }
                result[tablet.tablet_type] = suffixes;
            }
            return result;
        }

        function analyzeSuffixes(allSuffixesByTablet) {
            const allTabletTypes = Object.keys(allSuffixesByTablet);
            const allSuffixNames = new Map();
            for (const tabletType of allTabletTypes) {
                for (const suffix of allSuffixesByTablet[tabletType]) {
                    if (!allSuffixNames.has(suffix.name)) {
                        allSuffixNames.set(suffix.name, suffix);
                    }
                }
            }
            const sharedSuffixNames = new Set();
            const firstTablet = allTabletTypes[0];
            for (const suffixName of allSuffixesByTablet[firstTablet].map(s => s.name)) {
                let isShared = true;
                for (const tabletType of allTabletTypes) {
                    if (!allSuffixesByTablet[tabletType].some(s => s.name === suffixName)) {
                        isShared = false;
                        break;
                    }
                }
                if (isShared) sharedSuffixNames.add(suffixName);
            }
            const sharedSuffixes = [];
            const uniqueSuffixesByTablet = {};
            for (const tabletType of allTabletTypes) uniqueSuffixesByTablet[tabletType] = [];
            for (const suffixName of sharedSuffixNames) sharedSuffixes.push(allSuffixNames.get(suffixName));
            for (const tabletType of allTabletTypes) {
                for (const suffix of allSuffixesByTablet[tabletType]) {
                    if (!sharedSuffixNames.has(suffix.name)) {
                        uniqueSuffixesByTablet[tabletType].push(suffix);
                    }
                }
                uniqueSuffixesByTablet[tabletType].sort((a, b) => a.name.localeCompare(b.name));
            }
            sharedSuffixes.sort((a, b) => a.name.localeCompare(b.name));
            return { sharedSuffixes, uniqueSuffixesByTablet };
        }

        function renderPrefixList(prefixes) {
            const container = document.getElementById('prefix-list');
            if (!container) return;
            container.innerHTML = prefixes.map((prefix, index) => `
                <li class="modifier-item p-3 bg-gray-700/30 rounded-lg border border-gray-600/30">
                    <div class="flex items-center space-x-3">
                        <span class="text-sm font-bold text-amber-400 w-6 text-center">#${index + 1}</span>
                        <span class="font-medium text-white flex-1">${formatModName(prefix.name)}</span>
                    </div>
                    <p class="text-xs text-gray-400 mt-1 pl-9">${formatDescription(prefix.description)}</p>
                </li>
            `).join('');
            document.getElementById('prefix-badge').textContent = prefixes.length;
        }

        function renderSharedSuffixList(suffixes) {
            const container = document.getElementById('shared-suffix-list');
            if (!container) return;
            container.innerHTML = suffixes.map((suffix, index) => `
                <li class="modifier-item p-3 bg-gray-700/30 rounded-lg border border-gray-600/30">
                    <div class="flex items-center space-x-3">
                        <span class="text-sm font-bold text-emerald-400 w-6 text-center">#${index + 1}</span>
                        <span class="font-medium text-white flex-1">${formatModName(suffix.name)}</span>
                    </div>
                    <p class="text-xs text-gray-400 mt-1 pl-9">${formatDescription(suffix.description)}</p>
                </li>
            `).join('');
            document.getElementById('shared-badge').textContent = suffixes.length;
            document.getElementById('shared-suffix-count').textContent = suffixes.length;
        }

        function renderUniqueSuffixList(uniqueSuffixesByTablet) {
            const container = document.getElementById('unique-sections');
            if (!container) return;
            const tabletTypes = Object.keys(uniqueSuffixesByTablet).filter(tt => uniqueSuffixesByTablet[tt].length > 0).sort();
            container.innerHTML = tabletTypes.map(tabletType => {
                const info = tabletInfo[tabletType];
                const suffixes = uniqueSuffixesByTablet[tabletType];
                const sectionId = `tablet-${tabletType}`;
                return `
                    <section class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden">
                        <button onclick="toggleTabletSection('${tabletType}')" class="w-full p-4 text-left flex items-center justify-between hover:bg-gray-700/50 transition-colors">
                            <div class="flex items-center space-x-3">
                                <span class="text-2xl">${info.icon}</span>
                                <h2 class="text-xl font-semibold text-white">${info.name}</h2>
                                <span class="text-sm text-gray-400 bg-${info.color}-900/20 text-${info.color}-400 px-2 py-1 rounded-full">${suffixes.length} unique</span>
                            </div>
                            <svg class="tablet-icon w-5 h-5 text-gray-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <div id="${sectionId}-content" class="tablet-content p-4 pt-0 block">
                            <ul class="space-y-2">
                                ${suffixes.map((suffix, index) => `
                                    <li class="modifier-item p-3 bg-gray-700/30 rounded-lg border border-gray-600/30">
                                        <div class="flex items-center space-x-3">
                                            <span class="text-sm font-bold text-${info.color}-400 w-6 text-center">#${index + 1}</span>
                                            <span class="font-medium text-white flex-1">${formatModName(suffix.name)}</span>
                                        </div>
                                        <p class="text-xs text-gray-400 mt-1 pl-9">${formatDescription(suffix.description)}</p>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </section>
                `;
            }).join('');
        }

        async function fetchModifiers() {
            try {
                const leagueResponse = await fetch('http://localhost:8001/api/league/info');
                const leagueData = await leagueResponse.json();
                document.getElementById('current-league').textContent = leagueData.current_league || 'Unknown';
                const modResponse = await fetch('http://localhost:8001/api/reports/mod-reference');
                const modData = await modResponse.json();
                document.getElementById('tablet-count').textContent = modData.length;
                const allPrefixes = extractAllModifiers(modData, 'prefixes');
                document.getElementById('prefix-count').textContent = allPrefixes.length;
                renderPrefixList(allPrefixes);
                const allSuffixesByTablet = extractSuffixesByTablet(modData);
                const { sharedSuffixes, uniqueSuffixesByTablet } = analyzeSuffixes(allSuffixesByTablet);
                renderSharedSuffixList(sharedSuffixes);
                renderUniqueSuffixList(uniqueSuffixesByTablet);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('current-league').textContent = 'API Error';
                ['prefix-list', 'shared-suffix-list'].forEach(id => {
                    document.getElementById(id).innerHTML = '<li class="text-red-400 text-center py-4">Failed to load. Check backend at http://localhost:8001</li>';
                });
                document.getElementById('unique-sections').innerHTML = '<p class="text-red-400 text-center py-4">Failed to load. Check backend at http://localhost:8001</p>';
            }
        }

        fetchModifiers();
        setInterval(fetchModifiers, 5 * 60 * 1000);
    </script>
</body>
</html>
