<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>PoE2 Tablet Comparison</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: #0e0e0e;
                color: #c9b99a;
                font-family: "Segoe UI", sans-serif;
                font-size: 13px;
            }
            header {
                padding: 14px 24px;
                border-bottom: 1px solid #2a2a2a;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            header h1 {
                font-size: 17px;
                color: #e8d5a3;
                letter-spacing: 1px;
            }
            .top-nav {
                background: #1a1a1a;
                border-bottom: 1px solid #2a2a2a;
                padding: 8px 24px;
                display: flex;
                gap: 24px;
            }
            .top-nav a {
                color: #888;
                text-decoration: none;
                font-size: 12px;
                padding: 4px 8px;
                border-radius: 4px;
                transition: all 0.2s;
            }
            .top-nav a:hover {
                color: #c8a96e;
                background: #2a2a2a;
            }
            .top-nav a.active {
                color: #c8a96e;
                background: #2a2a2a;
            }
            .loading-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.8);
                display: none;
                align-items: center;
                justify-content: center;
                z-index: 10000;
            }
            .loading-overlay.visible {
                display: flex;
            }
            .spinner {
                border: 3px solid #333;
                border-top: 3px solid #a08050;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                animation: spin 1s linear infinite;
                margin-right: 16px;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
            .loading-text {
                font-size: 14px;
                color: #c8a96e;
            }
            .empty-state {
                text-align: center;
                padding: 40px 20px;
                color: #666;
                font-size: 12px;
            }
            .empty-state-icon {
                font-size: 48px;
                margin-bottom: 12px;
                opacity: 0.5;
            }
            .tooltip {
                position: relative;
            }
            .tooltip::after {
                content: attr(data-tooltip);
                position: absolute;
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%);
                padding: 6px 12px;
                background: #2a2a2a;
                border: 1px solid #3a3a3a;
                border-radius: 4px;
                font-size: 11px;
                color: #c9b99a;
                white-space: nowrap;
                opacity: 0;
                visibility: hidden;
                transition:
                    opacity 0.2s,
                    visibility 0.2s;
                z-index: 1000;
                margin-bottom: 8px;
            }
            .tooltip:hover::after {
                opacity: 1;
                visibility: visible;
            }
            .container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 20px;
            }
            .controls {
                display: flex;
                gap: 12px;
                margin-bottom: 20px;
                flex-wrap: wrap;
            }
            .select-container {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .select-container label {
                font-size: 11px;
                color: #888;
                text-transform: uppercase;
            }
            select {
                background: #1a1a1a;
                border: 1px solid #2a2a2a;
                color: #c9b99a;
                padding: 8px 12px;
                border-radius: 4px;
                font-size: 13px;
                min-width: 200px;
            }
            select:focus {
                outline: none;
                border-color: #a08050;
            }
            button {
                background: #1a1a1a;
                border: 1px solid #2a2a2a;
                color: #c9b99a;
                padding: 8px 16px;
                border-radius: 4px;
                font-size: 13px;
                cursor: pointer;
                align-self: flex-end;
            }
            button:hover {
                background: #2a2a2a;
                border-color: #a08050;
            }
            .comparison-container {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
                gap: 20px;
                margin-bottom: 20px;
            }
            .tablet-comparison {
                background: #141414;
                border: 1px solid #2a2a2a;
                border-radius: 6px;
                overflow: hidden;
            }
            .tablet-header {
                padding: 14px 16px;
                background: #1a1a1a;
                border-bottom: 1px solid #2a2a2a;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .tablet-header h2 {
                font-size: 14px;
                color: #c8a96e;
                text-transform: capitalize;
            }
            .remove-btn {
                background: transparent;
                border: none;
                color: #666;
                cursor: pointer;
                font-size: 16px;
                padding: 4px;
            }
            .remove-btn:hover {
                color: #c8a96e;
            }
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1px;
                background: #2a2a2a;
            }
            .stat-cell {
                padding: 8px 12px;
                text-align: center;
                font-size: 11px;
                background: #1a1a1a;
            }
            .stat-cell.header {
                font-weight: bold;
                color: #a08050;
                text-transform: uppercase;
                background: #141414;
            }
            .stat-cell.value {
                color: #c8a96e;
            }
            .modifiers-section {
                padding: 14px;
            }
            .section-title {
                font-size: 11px;
                color: #a08050;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 8px;
            }
            .mod-list {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }
            .mod-tag {
                background: #2a2a2a;
                border: 1px solid #3a3a3a;
                border-radius: 4px;
                padding: 3px 8px;
                font-size: 11px;
                color: #aaa;
            }
            .mod-tag:hover {
                border-color: #a08050;
                color: #c8a96e;
            }
            .category-badge {
                font-size: 10px;
                padding: 1px 4px;
                border-radius: 2px;
                margin-right: 4px;
                display: inline-block;
            }
            .category-General {
                color: #888;
                background: rgba(136, 136, 136, 0.15);
            }
            .category-Abyss {
                color: #9966cc;
                background: rgba(153, 102, 204, 0.15);
            }
            .category-Breach {
                color: #cc6666;
                background: rgba(204, 102, 102, 0.15);
            }
            .category-Delirium {
                color: #cc6699;
                background: rgba(204, 102, 153, 0.15);
            }
            .category-Expedition {
                color: #999966;
                background: rgba(153, 153, 102, 0.15);
            }
            .category-Ritual {
                color: #6699cc;
                background: rgba(102, 153, 204, 0.15);
            }
            .category-Temple {
                color: #996633;
                background: rgba(153, 102, 51, 0.15);
            }
            .category-Boss {
                color: #cc9966;
                background: rgba(204, 153, 102, 0.15);
            }
            .category-Monsters {
                color: #cc6633;
                background: rgba(204, 102, 51, 0.15);
            }
            .category-Items {
                color: #66cc99;
                background: rgba(102, 204, 153, 0.15);
            }
            .category-Containers {
                color: #999966;
                background: rgba(153, 153, 102, 0.15);
            }
            .category-Shrines {
                color: #66cccc;
                background: rgba(102, 204, 204, 0.15);
            }
            .category-Spirit {
                color: #9966cc;
                background: rgba(153, 102, 204, 0.15);
            }
            .category-Essence {
                color: #cc99cc;
                background: rgba(204, 153, 204, 0.15);
            }
            .category-Maps {
                color: #669966;
                background: rgba(102, 153, 102, 0.15);
            }
            .category-Currency {
                color: #cccc66;
                background: rgba(204, 204, 102, 0.15);
            }
            .category-Progression {
                color: #66cc66;
                background: rgba(102, 204, 102, 0.15);
            }
            @media (max-width: 768px) {
                .comparison-container {
                    grid-template-columns: 1fr;
                }
                .stats-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }
        </style>
    </head>
    <body>
        <div id="refresh-bar"></div>
        <div class="loading-overlay" id="loading-overlay">
            <div>
                <div class="spinner"></div>
                <div class="loading-text">Loading comparison...</div>
            </div>
        </div>
        <header>
            <h1>⬡ Tablet Comparison</h1>
            <div style="display: flex; align-items: center; gap: 14px">
                <span id="status">Static Data</span>
                <button
                    class="tooltip"
                    data-tooltip="Refresh data"
                    onclick="loadData()"
                    style="
                        padding: 4px 8px;
                        background: #2a2a2a;
                        border: 1px solid #3a3a3a;
                        color: #c8a96e;
                        border-radius: 4px;
                        cursor: pointer;
                        font-size: 12px;
                    "
                >
                    🔄
                </button>
                <span id="last-updated" style="font-size: 11px; color: #666"
                    >Just now</span
                >
            </div>
        </header>

        <div class="top-nav">
            <a href="/">Home</a>
            <a href="/dashboard">Main Dashboard</a>
            <a href="/normal-prices">Normal Prices</a>
            <a href="/modifiers">Modifiers</a>
            <a href="/compare-tablets" class="active">Compare</a>
            <a href="/favorites">Favorites</a>
            <div class="global-search">
                <span class="global-search-icon">🔍</span>
                <input
                    type="text"
                    id="global-search"
                    placeholder="Search..."
                    title="Press Ctrl+K or / to search"
                />
            </div>
        </div>

        <div class="container">
            <h2
                style="
                    margin-bottom: 16px;
                    color: #a08050;
                    text-transform: uppercase;
                    font-size: 12px;
                "
            >
                Compare Tablet Types Side-by-Side
            </h2>

            <div class="controls">
                <div class="select-container">
                    <label>First Tablet</label>
                    <select id="tablet-select-1">
                        <option value="">Select a tablet...</option>
                    </select>
                </div>
                <div class="select-container">
                    <label>Second Tablet</label>
                    <select id="tablet-select-2">
                        <option value="">Select a tablet...</option>
                    </select>
                </div>
                <div class="select-container">
                    <label>Third Tablet (Optional)</label>
                    <select id="tablet-select-3">
                        <option value="">Select a tablet...</option>
                    </select>
                </div>
            </div>

            <div class="comparison-container" id="comparison-container">
                <p style="color: #666; text-align: center; padding: 40px">
                    Select tablets from the dropdowns above to compare their
                    modifiers.
                </p>
            </div>
        </div>

        <script>
            const API = window.location.origin || "http://localhost:8001";
            let allData = [];

            // Populate tablet dropdowns
            async function loadData() {
                const loadingOverlay =
                    document.getElementById("loading-overlay");
                loadingOverlay.classList.add("visible");

                try {
                    const res = await fetch(
                        `${API}/api/reports/mod-reference-separated`,
                    );
                    if (res.ok) {
                        allData = await res.json();
                        populateDropdowns();
                        // Update timestamp
                        const now = new Date();
                        const timeStr = now.toLocaleTimeString([], {
                            hour: "2-digit",
                            minute: "2-digit",
                        });
                        document.getElementById("last-updated").textContent =
                            timeStr;
                        document.getElementById("status").textContent =
                            "Loaded";
                    } else {
                        showError(
                            "Failed to load data: Server returned error " +
                                res.status,
                        );
                    }
                } catch (e) {
                    console.error("Failed to load data:", e);
                    showError("Failed to load data: " + e.message);
                } finally {
                    loadingOverlay.classList.remove("visible");
                }
            }

            function showError(message) {
                console.error(message);
                const container = document.getElementById(
                    "comparison-container",
                );
                const existingEmpty = container.querySelector(".empty-state");
                if (!existingEmpty) {
                    const emptyState = document.createElement("div");
                    emptyState.className = "empty-state";
                    emptyState.innerHTML = `
                        <div class="empty-state-icon">⚠️</div>
                        <div>${message}</div>
                        <button onclick="loadData()" style="margin-top: 16px; padding: 8px 16px; background: #1a1a1a; border: 1px solid #a08050; color: #c8a96e; border-radius: 4px; cursor: pointer;">Retry</button>
                    `;
                    container.innerHTML = "";
                    container.appendChild(emptyState);
                }
            }

            function populateDropdowns() {
                const tabletTypes = allData.map((t) => t.tablet_type);
                const options = tabletTypes
                    .map(
                        (t) =>
                            `<option value="${t}">${t.charAt(0).toUpperCase() + t.slice(1)}</option>`,
                    )
                    .join("");

                document.getElementById("tablet-select-1").innerHTML =
                    '<option value="">Select a tablet...</option>' + options;
                document.getElementById("tablet-select-2").innerHTML =
                    '<option value="">Select a tablet...</option>' + options;
                document.getElementById("tablet-select-3").innerHTML =
                    '<option value="">Select a tablet...</option>' + options;

                // Add event listeners
                [1, 2, 3].forEach((num) => {
                    document
                        .getElementById(`tablet-select-${num}`)
                        .addEventListener("change", renderComparison);
                });
            }

            function getTabletData(tabletType) {
                return allData.find((t) => t.tablet_type === tabletType);
            }

            function renderComparison() {
                const container = document.getElementById(
                    "comparison-container",
                );
                const selections = [
                    document.getElementById("tablet-select-1").value,
                    document.getElementById("tablet-select-2").value,
                    document.getElementById("tablet-select-3").value,
                ].filter((t) => t);

                if (selections.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">ℹ️</div>
                            <div>Select tablets from the dropdowns above to compare their modifiers.</div>
                            <div style="margin-top: 8px; font-size: 11px; color: #555;">Choose 2-3 tablet types to see side-by-side comparison</div>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = selections
                    .map((type, idx) => {
                        const tablet = getTabletData(type);
                        if (!tablet) return "";

                        const prefixes = tablet.prefixes || {};
                        const suffixes = tablet.suffixes || {};

                        const allModGroups = {
                            ...prefixes,
                            ...suffixes,
                        };

                        const prefixCount = tablet.prefix_count || 0;
                        const suffixCount = tablet.suffix_count || 0;
                        const totalMods = tablet.mod_count || 0;

                        return `
                        <div class="tablet-comparison">
                            <div class="tablet-header">
                                <h2>${type.charAt(0).toUpperCase() + type.slice(1)}</h2>
                                <button class="remove-btn" onclick="removeTablet(${idx})" title="Remove">×</button>
                            </div>
                            <div class="stats-grid">
                                <div class="stat-cell header">Stat</div>
                                <div class="stat-cell header">Value</div>
                                <div class="stat-cell header">Category</div>
                                <div class="stat-cell header">Total Modifiers</div>
                                <div class="stat-cell value">${totalMods}</div>
                                <div class="stat-cell header">Prefixes</div>
                                <div class="stat-cell value">${prefixCount}</div>
                                <div class="stat-cell header">Suffixes</div>
                                <div class="stat-cell value">${suffixCount}</div>
                            </div>
                            <div class="modifiers-section">
                                <div class="section-title">All Modifier Groups (${Object.keys(allModGroups).length})</div>
                                <div class="mod-list">
                                    ${Object.entries(allModGroups)
                                        .map(([group, groupData]) => {
                                            const mods =
                                                groupData.mods || groupData;
                                            const category =
                                                groupData.category || "General";
                                            const isPrefix =
                                                Object.keys(prefixes).includes(
                                                    group,
                                                );
                                            const typeLabel = isPrefix
                                                ? "P"
                                                : "S";
                                            return mods
                                                .map(
                                                    (m) =>
                                                        `<span class="mod-tag" title="${typeLabel}: ${m.description}">` +
                                                        `<span class="category-badge category-${category}">${category}</span>` +
                                                        `${m.name}</span>`,
                                                )
                                                .join("");
                                        })
                                        .join("")}
                                </div>
                            </div>
                            <div class="modifiers-section">
                                <div class="section-title">Unique Suffixes</div>
                                <div class="mod-list">
                                    ${Object.entries(suffixes)
                                        .map(([group, groupData]) => {
                                            const mods =
                                                groupData.mods || groupData;
                                            const category =
                                                groupData.category || "General";
                                            return mods
                                                .map(
                                                    (m) =>
                                                        `<span class="mod-tag"><span class="category-badge category-${category}">${category}</span>${m.name}</span>`,
                                                )
                                                .join("");
                                        })
                                        .join("")}
                                </div>
                            </div>
                        </div>
                    `;
                    })
                    .join("");
            }

            function removeTablet(index) {
                const selectId = `tablet-select-${index + 1}`;
                document.getElementById(selectId).value = "";
                renderComparison();
            }

            loadData();

            // Global search functionality
            const searchInput = document.getElementById("global-search");
            if (searchInput) {
                searchInput.addEventListener("input", (e) => {
                    const query = e.target.value.toLowerCase();
                    if (query.length < 2) {
                        // Reset all comparisons
                        document
                            .querySelectorAll(".tablet-comparison")
                            .forEach((card) => {
                                card.style.display = "";
                            });
                        return;
                    }

                    // Search through comparison cards
                    document
                        .querySelectorAll(".tablet-comparison")
                        .forEach((card) => {
                            const text = card.textContent.toLowerCase();
                            card.style.display = text.includes(query)
                                ? ""
                                : "none";
                        });
                });

                // Keyboard shortcut: Ctrl+K or / to focus search
                document.addEventListener("keydown", (e) => {
                    if ((e.ctrlKey && e.key === "k") || e.key === "/") {
                        if (
                            e.target.tagName !== "INPUT" &&
                            e.target.tagName !== "SELECT"
                        ) {
                            e.preventDefault();
                            searchInput.focus();
                        }
                    }
                    if (e.key === "Escape") {
                        searchInput.value = "";
                        searchInput.dispatchEvent(new Event("input"));
                        searchInput.blur();
                    }
                });
            }
        </script>
    <script src="/js/shared.js"></script>
    </body>
</html>
