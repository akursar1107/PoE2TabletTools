<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>PoE2 Tablet Detail</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: #0e0e0e;
                color: #c9b99a;
                font-family: "Segoe UI", sans-serif;
                font-size: 13px;
            }
            header {
                padding: 14px 24px;
                border-bottom: 1px solid #2a2a2a;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            header h1 {
                font-size: 17px;
                color: #e8d5a3;
                letter-spacing: 1px;
            }
            .top-nav {
                background: #1a1a1a;
                border-bottom: 1px solid #2a2a2a;
                padding: 8px 24px;
                display: flex;
                gap: 24px;
            }
            .top-nav a {
                color: #888;
                text-decoration: none;
                font-size: 12px;
                padding: 4px 8px;
                border-radius: 4px;
                transition: all 0.2s;
            }
            .top-nav a:hover {
                color: #c8a96e;
                background: #2a2a2a;
            }
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
            }
            .tablet-header {
                display: flex;
                align-items: center;
                gap: 20px;
                margin-bottom: 20px;
                padding: 20px;
                background: #141414;
                border: 1px solid #2a2a2a;
                border-radius: 6px;
            }
            .tablet-icon {
                font-size: 40px;
            }
            .tablet-info h2 {
                font-size: 18px;
                color: #c8a96e;
                margin-bottom: 8px;
            }
            .tablet-info p {
                color: #888;
                font-size: 12px;
            }
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 14px;
                margin-bottom: 20px;
            }
            .stat-card {
                background: #141414;
                border: 1px solid #2a2a2a;
                border-radius: 6px;
                padding: 16px;
            }
            .stat-card h3 {
                font-size: 11px;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 8px;
            }
            .stat-card .value {
                font-size: 20px;
                color: #c8a96e;
                font-weight: bold;
            }
            .section {
                background: #141414;
                border: 1px solid #2a2a2a;
                border-radius: 6px;
                margin-bottom: 14px;
                overflow: hidden;
            }
            .section-header {
                padding: 12px 16px;
                font-size: 12px;
                color: #a08050;
                text-transform: uppercase;
                letter-spacing: 1px;
                background: #1a1a1a;
                border-bottom: 1px solid #2a2a2a;
            }
            .section-content {
                padding: 16px;
            }
            .mod-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 12px;
            }
            .mod-card {
                background: #1a1a1a;
                border: 1px solid #2a2a2a;
                border-radius: 4px;
                padding: 12px;
            }
            .mod-card h4 {
                font-size: 11px;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 8px;
            }
            .mod-item {
                font-size: 12px;
                color: #aaa;
                padding: 4px 0;
                padding-left: 12px;
                border-left: 2px solid #333;
                margin: 3px 0;
            }
            .mod-item:hover {
                color: #c8a96e;
                border-left-color: #a08050;
            }
            .mod-description {
                color: #777;
                font-size: 11px;
                font-weight: normal;
            }
            .mod-type-badge {
                font-size: 10px;
                padding: 1px 4px;
                border-radius: 2px;
                font-weight: bold;
                margin-right: 6px;
            }
            .prefix-badge {
                color: #996666;
                background: rgba(153, 102, 102, 0.15);
            }
            .suffix-badge {
                color: #669966;
                background: rgba(102, 153, 102, 0.15);
            }
            .back-link {
                display: inline-block;
                padding: 8px 16px;
                background: #1a1a1a;
                border: 1px solid #2a2a2a;
                border-radius: 4px;
                color: #888;
                text-decoration: none;
                font-size: 12px;
                margin-bottom: 14px;
            }
            .back-link:hover {
                color: #c8a96e;
                border-color: #a08050;
            }
        </style>
    </head>
    <body>
        <div id="refresh-bar"></div>
        <header>
            <h1>⬡ Tablet Detail</h1>
            <span id="status">Static Data</span>
        </header>

        <div class="top-nav">
            <a href="/">Home</a>
            <a href="/dashboard">Main Dashboard</a>
            <a href="/normal-prices">Normal Prices</a>
            <a href="/modifiers">Modifiers</a>
        </div>

        <div class="container">
            <a href="/modifiers" class="back-link">← Back to All Modifiers</a>

            <div class="tablet-header" id="tablet-header">
                <div class="tablet-icon" id="tablet-icon">📜</div>
                <div class="tablet-info">
                    <h2 id="tablet-name">Loading...</h2>
                    <p id="tablet-desc">Tablet modifier reference</p>
                </div>
            </div>

            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <h3>Total Modifiers</h3>
                    <div class="value" id="total-mods">0</div>
                </div>
                <div class="stat-card">
                    <h3>Prefixes</h3>
                    <div class="value" id="prefix-count">0</div>
                </div>
                <div class="stat-card">
                    <h3>Suffixes</h3>
                    <div class="value" id="suffix-count">0</div>
                </div>
                <div class="stat-card">
                    <h3>Modifier Groups</h3>
                    <div class="value" id="group-count">0</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">Prefixes</div>
                <div class="section-content">
                    <div class="mod-grid" id="prefixes-grid"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">Suffixes</div>
                <div class="section-content">
                    <div class="mod-grid" id="suffixes-grid"></div>
                </div>
            </div>
        </div>

        <script>
            const API = window.location.origin || "http://localhost:8001";
            let allData = [];
            let currentTablet = null;

            // Get tablet type from URL path (e.g., /tablet/breach)
            const pathParts = window.location.pathname.split('/');
            const tabletType = pathParts[pathParts.length - 1];

            // Icon mapping for each tablet type
            const tabletIcons = {
                irradiated: '☢️',
                abyss: '🕳️',
                breach: '💥',
                delirium: '👁️',
                expedition: '🗺️',
                overseer: '👁️',
                ritual: '⚰️',
                temple: '🏛️'
            };

            // Descriptions for each tablet type
            const tabletDescriptions = {
                irradiated: 'Irradiated Tablet - Generic tablet type with no specific mechanics',
                abyss: 'Abyss Tablet - Spawns abysses in maps',
                breach: 'Breach Tablet - Spawns unstable breaches in maps',
                delirium: 'Delirium Tablet - Creates delirium fog in maps',
                expedition: 'Expedition Tablet - Adds expedition encounters to maps',
                overseer: 'Overseer Tablet - Affects map bosses and their rewards',
                ritual: 'Ritual Tablet - Adds ritual altars to maps',
                temple: 'Temple Tablet - Adds Vaal incursion architecture to maps'
            };

            async function loadData() {
                try {
                    const res = await fetch(`${API}/api/reports/mod-reference`);
                    if (res.ok) {
                        allData = await res.json();
                        currentTablet = allData.find(t => t.tablet_type === tabletType);
                        if (currentTablet) {
                            renderPage();
                        } else {
                            document.getElementById('tablet-name').textContent = 'Tablet not found';
                        }
                    }
                } catch (e) {
                    console.error("Failed to load data:", e);
                }
            }

            function renderPage() {
                // Set header info
                const icon = tabletIcons[tabletType] || '📜';
                const desc = tabletDescriptions[tabletType] || 'Tablet modifier reference';
                document.getElementById('tablet-icon').textContent = icon;
                document.getElementById('tablet-name').textContent = tabletType.charAt(0).toUpperCase() + tabletType.slice(1);
                document.getElementById('tablet-desc').textContent = desc;

                // Set stats
                document.getElementById('total-mods').textContent = currentTablet.mod_count || 0;
                document.getElementById('prefix-count').textContent = currentTablet.prefix_count || 0;
                document.getElementById('suffix-count').textContent = currentTablet.suffix_count || 0;
                const totalGroups = (currentTablet.prefixes ? Object.keys(currentTablet.prefixes).length : 0) +
                                   (currentTablet.suffixes ? Object.keys(currentTablet.suffixes).length : 0);
                document.getElementById('group-count').textContent = totalGroups;

                // Render prefixes
                const prefixesGrid = document.getElementById('prefixes-grid');
                const prefixes = currentTablet.prefixes || {};
                prefixesGrid.innerHTML = Object.entries(prefixes)
                    .map(([group, mods]) => `
                        <div class="mod-card">
                            <h4><span class="mod-type-badge prefix-badge">Prefix</span>${group}</h4>
                            ${mods.map(m => `
                                <div class="mod-item">
                                    <strong>${m.name}</strong>
                                    <span class="mod-description"> - ${m.description}</span>
                                </div>
                            `).join('')}
                        </div>
                    `)
                    .join('');

                // Render suffixes
                const suffixesGrid = document.getElementById('suffixes-grid');
                const suffixes = currentTablet.suffixes || {};
                suffixesGrid.innerHTML = Object.entries(suffixes)
                    .map(([group, mods]) => `
                        <div class="mod-card">
                            <h4><span class="mod-type-badge suffix-badge">Suffix</span>${group}</h4>
                            ${mods.map(m => `
                                <div class="mod-item">
                                    <strong>${m.name}</strong>
                                    <span class="mod-description"> - ${m.description}</span>
                                </div>
                            `).join('')}
                        </div>
                    `)
                    .join('');
            }

            loadData();
        </script>
    </body>
</html>
